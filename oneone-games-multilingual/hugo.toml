baseURL = 'https://oneone.games/'
languageCode = 'en-us'
title = 'OneOne Games - AI Magic Playground'
theme = 'oneone-theme'

[params]
  description = "A dad-daughter duo building creative games with AI for children aged 4-10"
  author = "一一 & Dad"
  github = "https://github.com/bluelyw/Homepage-oneonegames"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    identifier = "games"
    name = "Games"
    url = "/games/"
    weight = 2
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 3

