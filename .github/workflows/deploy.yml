name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true
      
      - name: Build with Hugo
        run: |
          cd oneone-games-multilingual
          hugo --minify=false
      
      - name: Prepare deployment directory
        run: |
          # 创建部署目录
          mkdir -p deploy
          # 复制Hugo构建的文件，但排除sitemap文件
          cd oneone-games-multilingual/public
          find . -type f ! -name "sitemap.xml" -exec cp --parents {} ../../deploy \;
      
      - name: Copy manual sitemap files
        run: |
          # 复制手动创建的sitemap文件到部署目录
          cp sitemap.xml deploy/ || true
          cp */sitemap.xml deploy/ || true
          cp *-sitemap.xml deploy/ || true
      
      - name: Verify main sitemap
        run: |
          echo "Checking main sitemap content:"
          head -5 deploy/sitemap.xml
          echo "Main sitemap should contain <sitemapindex>"
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
